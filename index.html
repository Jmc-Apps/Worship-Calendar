async function twcGetFreshGithubSha(g){
  if(typeof ghGetFile==="function"){
    let file=await ghGetFile(g);
    return file&&file.sha?file.sha:"";
  }
  let url=`https://api.github.com/repos/${g.owner}/${g.repo}/contents/${encodeURIComponent(g.path).replace(/%2F/g,"/")}?ref=${encodeURIComponent(g.branch)}`;
  let res=await fetch(url,{headers:{Authorization:`token ${g.token}`,Accept:"application/vnd.github+json"}});
  if(res.status===404)return "";
  if(!res.ok)throw new Error(`GitHub SHA fetch failed: ${res.status} ${await res.text()}`);
  let json=await res.json();
  return json.sha||"";
}
async function twcGithubSaveWithFreshSha(){
  if(typeof ghConfig!=="function")throw new Error("GitHub settings function not found.");
  let g=ghConfig();
  if(!g||!g.token||!g.owner||!g.repo||!g.branch||!g.path)throw new Error("GitHub settings are incomplete.");

  let content=JSON.stringify(data,null,2);
  let encoded=btoa(unescape(encodeURIComponent(content)));
  let url=`https://api.github.com/repos/${g.owner}/${g.repo}/contents/${encodeURIComponent(g.path).replace(/%2F/g,"/")}`;

  for(let attempt=1;attempt<=3;attempt++){
    let sha=await twcGetFreshGithubSha(g);
    let body={
      message:`Update The Worship Calendar data ${new Date().toISOString()}`,
      content:encoded,
      branch:g.branch
    };
    if(sha)body.sha=sha;

    let res=await fetch(url,{
      method:"PUT",
      headers:{Authorization:`token ${g.token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},
      body:JSON.stringify(body)
    });

    if(res.ok){
      let json=await res.json();
      if(json&&json.content&&json.content.sha){
        data.github=data.github||{};
        data.github.sha=json.content.sha;
      }
      if(typeof save==="function")save();
      return json;
    }

    let text=await res.text();
    if(res.status===409&&attempt<3){
      console.warn("GitHub SHA conflict. Fetching latest SHA and retrying.",text);
      await new Promise(resolve=>setTimeout(resolve,250));
      continue;
    }
    if(res.status===409){
      throw new Error(`GitHub file changed while saving. Please reload online data and try again. ${text}`);
    }
    throw new Error(`GitHub save failed: ${res.status} ${text}`);
  }
}

  }

async function twcLoadGithubDataForLogin(){
  if(!twcHasGithubSettingsForLogin())return false;
  if(typeof ghConfig!=="function"||typeof ghGetFile!=="function"||typeof ghDecodeUnicode!=="function")return false;

  let g=ghConfig();
  if(!g||!g.token||!g.owner||!g.repo||!g.branch||!g.path)return false;

  let file=await ghGetFile(g);
  if(!file||!file.content)return false;

  let loaded=JSON.parse(ghDecodeUnicode(file.content));

  let currentGithub=data.github||{};
  let currentGmail=data.gmail||{};
  let localGithub=typeof loadGithubAccessLocal==="function"?loadGithubAccessLocal():null;
  let localGmail=typeof loadGmailLocalConfig==="function"?loadGmailLocalConfig():null;

  data=loaded;
  data.github=data.github||{};
  ["token","owner","repo","branch","path"].forEach(k=>{
    data.github[k]=(currentGithub&&currentGithub[k])||(localGithub&&localGithub[k])||data.github[k]||"";
  });

  data.gmail=data.gmail||{};
  ["clientId","apiKey","sender","accessToken","connectedAt"].forEach(k=>{
    data.gmail[k]=(currentGmail&&currentGmail[k])||(localGmail&&localGmail[k])||data.gmail[k]||"";
  });

  if(typeof saveGithubAccessLocal==="function"){
    saveGithubAccessLocal({
      token:data.github.token||"",
      owner:data.github.owner||"",
      repo:data.github.repo||"",
      branch:data.github.branch||"main",
      path:data.github.path||"data/the-worship-calendar.json"
    });
  }
  if(typeof saveGmailLocalConfig==="function")saveGmailLocalConfig();
  if(typeof save==="function")save();

  return true;
}

function icsEscape(value){
  return String(value||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\r?\n/g,"\\n");
}
function pad2(n){return String(n).padStart(2,"0")}
function formatICSDateTimeLocal(dateStr,timeStr){
  let t=(timeStr||"09:00").trim();
  let parts=t.split(":");
  let hh=pad2(parseInt(parts[0]||"0",10));
  let mm=pad2(parseInt(parts[1]||"0",10));
  return dateStr.replace(/-/g,"")+"T"+hh+mm+"00";
}
function addMinutesToTime(dateStr,timeStr,minutes){
  let d=new Date(dateStr+"T"+(timeStr||"09:00")+":00");
  d.setMinutes(d.getMinutes()+minutes);
  return d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate())+"T"+pad2(d.getHours())+pad2(d.getMinutes())+"00";
}
function utcStamp(){
  let d=new Date();
  return d.getUTCFullYear()+pad2(d.getUTCMonth()+1)+pad2(d.getUTCDate())+"T"+pad2(d.getUTCHours())+pad2(d.getUTCMinutes())+pad2(d.getUTCSeconds())+"Z";
}
function foldICSLine(line){
  let out="";
  while(line.length>73){
    out+=line.slice(0,73)+"\r\n ";
    line=line.slice(73);
  }
  return out+line;
}
function downloadMyCalendar(){
  const member=data.members.find(m=>m.id===user.memberId);
  if(!member){alert("Member profile not found.");return}
  const events=[];
  data.rosters.filter(r=>r.published).forEach(r=>{
    const roles=(r.assignments||[]).filter(a=>a.memberId===member.id).map(a=>a.roleName);
    if(!roles.length)return;
    const times=(r.times&&r.times.length?r.times:[r.time||"09:00"]).filter(Boolean);
    times.forEach((t,i)=>{
      events.push({
        uid:`${r.id}-${member.id}-${i}@theworshipcalendar.local`,
        date:r.date,
        time:t,
        summary:`${r.serviceName} - ${roles.join(", ")}`,
        description:`Rostered via The Worship Calendar\\nRoles: ${roles.join(", ")}\\nService Times: ${serviceTimesText(r)}`,durationMinutes:getTemplateServiceLength((data.services.find(s=>s.id===r.serviceId)||{}).template)
      });
    });
  });
  if(!events.length){alert("No published rostered services found for your profile.");return}
  let lines=[
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//The Worship Calendar//Roster Export//EN",
    "CALSCALE:GREGORIAN",
    "METHOD:PUBLISH"
  ];
  const stamp=utcStamp();
  events.forEach(ev=>{
    lines.push("BEGIN:VEVENT");
    lines.push("UID:"+icsEscape(ev.uid));
    lines.push("DTSTAMP:"+stamp);
    lines.push("DTSTART:"+formatICSDateTimeLocal(ev.date,ev.time));
    lines.push("DTEND:"+addMinutesToTime(ev.date,ev.time,ev.durationMinutes||90));
    lines.push("SUMMARY:"+icsEscape(ev.summary));
    lines.push("DESCRIPTION:"+icsEscape(ev.description));
    lines.push("END:VEVENT");
  });
  lines.push("END:VCALENDAR");
  const icsText=lines.map(foldICSLine).join("\r\n")+"\r\n";
  const blob=new Blob([icsText],{type:"text/calendar;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="TheWorshipCalendar_My_Roster_v1.36.ics";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

async function refreshFromGitHubAfterLogin(){
  try{
    if(typeof ghConfig!=="function"||typeof ghGetFile!=="function"||typeof ghDecodeUnicode!=="function"){
      setLoginRefreshStatus("",false);
      return false;
    }
    let g=ghConfig();
    if(!g||!g.token||!g.owner||!g.repo||!g.branch||!g.path){
      setLoginRefreshStatus("No connection file uploaded",true);
      return false;
    }
    setLoginRefreshStatus("Refreshing data from GitHub…",false);
    let file=await ghGetFile(g);
    if(!file){
      setLoginRefreshStatus("No GitHub data file found. Using local cached data.",true);
      return false;
    }
    let loaded=JSON.parse(ghDecodeUnicode(file.content));
    let currentGithub=data.github||{};
    let currentGmail=data.gmail||{};
    let localGithub=typeof loadGithubAccessLocal==="function"?loadGithubAccessLocal():null;
    let localGmail=typeof loadGmailLocalConfig==="function"?loadGmailLocalConfig():null;
    let currentUser=user;
    let currentTab=tab;

    data=loaded;

    data.github=data.github||{};
    ["token","owner","repo","branch","path"].forEach(k=>{
      data.github[k]=(currentGithub&&currentGithub[k])||(localGithub&&localGithub[k])||data.github[k]||"";
    });

    data.gmail=data.gmail||{};
    ["clientId","apiKey","sender","accessToken","connectedAt"].forEach(k=>{
      data.gmail[k]=(currentGmail&&currentGmail[k])||(localGmail&&localGmail[k])||data.gmail[k]||"";
    });

    user=currentUser;
    tab=currentTab;

    if(typeof saveGithubAccessLocal==="function"){
      saveGithubAccessLocal({token:data.github.token||"",owner:data.github.owner||"",repo:data.github.repo||"",branch:data.github.branch||"main",path:data.github.path||"data/the-worship-calendar.json"});
    }
    if(typeof saveGmailLocalConfig==="function")saveGmailLocalConfig();
    if(typeof save==="function")save();

    setLoginRefreshStatus("Data refreshed from GitHub",false);
    render();
    return true;
  }catch(e){
    console.error("Background GitHub refresh failed",e);
    setLoginRefreshStatus("Could not refresh from GitHub. Using local cached data.",true);
    return false;
  }
}

function ghApiUrl(g){
  return `https://api.github.com/repos/${encodeURIComponent(g.owner)}/${encodeURIComponent(g.repo)}/contents/${g.path.split("/").map(encodeURIComponent).join("/")}?ref=${encodeURIComponent(g.branch)}`;
}
function ghWriteUrl(g){
  return `https://api.github.com/repos/${encodeURIComponent(g.owner)}/${encodeURIComponent(g.repo)}/contents/${g.path.split("/").map(encodeURIComponent).join("/")}`;
}
function ghEncodeUnicode(str){
  return btoa(unescape(encodeURIComponent(str)));
}
function ghDecodeUnicode(str){
  return decodeURIComponent(escape(atob(str.replace(/\n/g,""))));
}
async function ghGetFile(g){
  let res=await fetch(ghApiUrl(g),{headers:{Authorization:`Bearer ${g.token}`,Accept:"application/vnd.github+json"}});
  if(res.status===404)return null;
  if(!res.ok)throw new Error(`GitHub read failed: ${res.status} ${await res.text()}`);
  return await res.json();
}
function ghExportData(){
  let copy=JSON.parse(JSON.stringify(data));

  // Never upload tokens/secrets to GitHub app data.
  // GitHub blocks these via secret scanning and they should remain local-device only.
  copy.github=copy.github||{};
  delete copy.github.token;
  copy.github.tokenStored="local-device-only";

  copy.gmail=copy.gmail||{};
  delete copy.gmail.accessToken;
  delete copy.gmail.refreshToken;
  delete copy.gmail.apiKey;
  copy.gmail.accessTokenStored="local-device-only";
  copy.gmail.apiKeyStored="local-device-only";

  return copy;
}
async function submitChangesOnline(){
  async function doSaveWithLatestSha(){
    let g=ghValidate();
    let existing=await ghGetFile(g);
    let payload=ghExportData();
    payload.github=payload.github||{};
    payload.github.lastSync=new Date().toISOString();
    let body={
      message:`The Worship Calendar sync ${new Date().toISOString()}`,
      content:ghEncodeUnicode(JSON.stringify(payload,null,2)),
      branch:g.branch
    };
    if(existing&&existing.sha)body.sha=existing.sha;
    let res=await fetch(ghWriteUrl(g),{
      method:"PUT",
      headers:{Authorization:`Bearer ${g.token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    if(!res.ok){
      let text=await res.text();
      let err=new Error(`GitHub save failed: ${res.status} ${text}`);
      err.status=res.status;
      throw err;
    }
    return await res.json();
  }
  try{
    save();
    ghStatus("Saving online…");
    await doSaveWithLatestSha();
    data.github=data.github||{};
    data.github.lastSync=new Date().toISOString();
    save();
    ghStatus("Saved online");
    return true;
  }catch(err){
    if(err&&err.status===409){
      try{
        ghStatus("GitHub file changed online. Retrying with latest version…");
        await doSaveWithLatestSha();
        data.github=data.github||{};
        data.github.lastSync=new Date().toISOString();
        save();
        ghStatus("Saved online after refresh");
        return true;
      }catch(retryErr){
        console.error(retryErr);
        ghStatus("Failed to save after retry: "+(retryErr.message||retryErr),true);
        throw retryErr;
      }
    }
    console.error(err);
    ghStatus("Failed to save: "+(err.message||err),true);
    throw err;
  }
}

function rosterEmailTextForMember(member){
  let lines=[];
  lines.push(`Hi ${member.name || ""},`);
  lines.push("");
  lines.push("Here is your personalized worship roster:");
  lines.push("");
  let published=(data.rosters||[])
    .filter(r=>r.published)
    .map(r=>({roster:r,assignments:(r.assignments||[]).filter(a=>a.memberId===member.id)}))
    .filter(x=>x.assignments.length)
    .sort((a,b)=>(a.roster.date+(a.roster.time||((a.roster.times||[])[0])||"")).localeCompare(b.roster.date+(b.roster.time||((b.roster.times||[])[0])||"")));
  if(!published.length){
    lines.push("You are not currently rostered for any published services.");
  }else{
    published.forEach(item=>{
      let r=item.roster;
      lines.push(`${r.date} — ${r.serviceName} (${typeof serviceTimesText==="function"?serviceTimesText(r):((r.times&&r.times.length?r.times:[r.time||""]).join(", "))})`);
      let grouped={};
      item.assignments.forEach(a=>{
        let ministry="Ministry";
        if(typeof v152RoleMinistryId==="function"&&typeof v152MinistryName==="function"){
          ministry=v152MinistryName(v152RoleMinistryId(a.roleName));
        }else if(typeof v153RoleMinistryId==="function"&&typeof v153MinistryName==="function"){
          ministry=v153MinistryName(v153RoleMinistryId(a.roleName));
        }else if(typeof getMinistryName==="function"){
          let role=(data.roles||[]).find(x=>x.name===a.roleName);
          ministry=getMinistryName(role&&role.ministryId);
        }
        (grouped[ministry]=grouped[ministry]||[]).push(a.roleName);
      });
      Object.keys(grouped).forEach(min=>{
        lines.push(`  ${min}:`);
        grouped[min].forEach(role=>lines.push(`  - ${role}`));
      });
      lines.push("");
    });
  }
  lines.push("Blessings,");
  lines.push(memberEmailSignature());
  return lines.join("\n");
}
function makeRawGmailMessage(to,subject,body){
  let g=gmailConfig();
  let from=g.sender?`From: ${g.sender}\r\n`:"";
  let raw=`${from}To: ${to}\r\nSubject: ${subject}\r\nContent-Type: text/plain; charset="UTF-8"\r\n\r\n${body}`;
  return btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
async function sendGmailMessage(to,subject,body){
  let g=gmailConfig();
  if(!g.accessToken)throw new Error("Gmail is not connected.");
  let raw=makeRawGmailMessage(to,subject,body);
  let res=await fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages/send",{
    method:"POST",
    headers:{Authorization:`Bearer ${g.accessToken}`,"Content-Type":"application/json"},
    body:JSON.stringify({raw})
  });
  if(!res.ok)throw new Error(`Failed sending to ${to}: ${res.status} ${await res.text()}`);
  return await res.json();
}
async function emailPersonalizedRosters(){
  try{
    let g=gmailConfig();
    if(!g.accessToken){alert("Please connect Gmail in Settings first.");return}
    let members=emailableTeamMembers();
    if(!members.length){alert("No member email addresses found.");return}
    if(!confirm(`Send personalized roster emails to ${members.length} member(s)?`))return;
    let sent=0,failed=0,errors=[];
    for(const member of members){
      if(isProtectedSystemAdminForEmail(member))continue;
      let body=rosterEmailTextForMember(member);
      try{
        await sendGmailMessage(member.email,"Your Worship Roster",body);
        sent++;
      }catch(err){
        failed++;
        errors.push(`${member.name||member.email}: ${err.message||err}`);
      }
    }
    let msg=`Roster emails sent: ${sent}. Failed: ${failed}.`;
    if(errors.length)msg+="\n\n"+errors.slice(0,5).join("\n");
    alert(msg);
  }catch(err){
    console.error(err);
    alert("Could not send roster emails: "+(err.message||err));
  }
}

function importApiBackupFile(input){
  let file=input.files&&input.files[0];
  if(!file)return;
  let reader=new FileReader();
  reader.onload=()=>{
    try{
      let backup=JSON.parse(reader.result);
      if(backup.type!=="the-worship-calendar-api-backup")throw new Error("This is not a valid Worship Calendar API backup file.");
      data.github=data.github||{};
      if(backup.github){
        ["token","owner","repo","branch","path"].forEach(k=>{if(backup.github[k]!==undefined)data.github[k]=backup.github[k]});
        if(typeof saveGithubAccessLocal==="function")saveGithubAccessLocal({
          token:data.github.token||"",
          owner:data.github.owner||"",
          repo:data.github.repo||"",
          branch:data.github.branch||"main",
          path:data.github.path||"data/the-worship-calendar.json"
        });
      }
      data.gmail=data.gmail||{};
      if(backup.gmail){
        ["clientId","apiKey","sender","accessToken","connectedAt"].forEach(k=>{if(backup.gmail[k]!==undefined)data.gmail[k]=backup.gmail[k]});
        if(typeof saveGmailLocalConfig==="function")saveGmailLocalConfig();
      }
      data.settings=data.settings||{};
      if(backup.settings&&backup.settings.churchName!==undefined)data.settings.churchName=backup.settings.churchName;
      if(backup.settings&&backup.settings.appUrl!==undefined)data.settings.appUrl=backup.settings.appUrl;
      save();
      alert("API backup imported. Loading church data...");
      twcAfterApiImport();
    }catch(err){alert("Could not import API backup: "+(err.message||err))}
  };
  reader.readAsText(file);
  input.value="";
}

    var remaining=assignTotal-totalMin;
    while(remaining>0){
      var best=-1, bestScore=Infinity;
      for(var i=0;i<serviceCount;i++){
        if(targets[i]>=maxList[i])continue;
        var score=targets[i];
        if(score<bestScore){bestScore=score;best=i;}
      }
      if(best<0)break;
      targets[best]++;
      remaining--;
    }
  }else{
    var shortLeft=assignTotal;
    while(shortLeft>0){
      var bestShort=-1, bestShortScore=Infinity;
      for(var j=0;j<serviceCount;j++){
        if(targets[j]>=minList[j]||targets[j]>=maxList[j])continue;
        var s=targets[j];
        if(s<bestShortScore){bestShortScore=s;bestShort=j;}
      }
      if(bestShort<0)break;
      targets[bestShort]++;
      shortLeft--;
    }
  }
  return targets;
}
function twcV245BuildRostersForServices(serviceList){
  if(typeof ensureMinistries==="function")ensureMinistries();
  var services=(serviceList||[]).slice().sort(function(a,b){return twcV245ServiceSortKey(a).localeCompare(twcV245ServiceSortKey(b));});
  var rostersByService={};
  services.forEach(function(service){
    rostersByService[service.id]={id:uid(),serviceId:service.id,serviceName:service.name,date:service.date,time:service.time,times:service.times||[service.time],published:false,assignments:[]};
  });

  var groupMap={};
  services.forEach(function(service){
    twcV245RolesForService(service).forEach(function(role){
      var month=String(service.date||"").slice(0,7);
      var key=month+"||"+role.name;
      if(!groupMap[key])groupMap[key]={month:month,role:role,items:[]};
      groupMap[key].items.push({service:service,minmax:twcV245RoleMinMax(service,role)});
    });
  });

  Object.keys(groupMap).sort().forEach(function(key){
    var group=groupMap[key];
    group.items.sort(function(a,b){return twcV245ServiceSortKey(a.service).localeCompare(twcV245ServiceSortKey(b.service));});
    var role=group.role;
    var month=group.month;
    var skipServiceIds={};
    services.forEach(function(s){skipServiceIds[s.id]=true;});

    var members=twcV240AssignableMembers().filter(function(m){return twcV240MemberCanDoRoleBasic(m,role);});
    var roleUsed={};
    members.forEach(function(m){roleUsed[m.id]=twcV245BaseUsed(m.id,role.name,month,skipServiceIds);});

    var totalRemainingCapacity=members.reduce(function(sum,m){
      return sum+Math.max(0,twcV245MemberLimit(m)-(roleUsed[m.id]||0));
    },0);

    var minList=group.items.map(function(x){return x.minmax.min;});
    var maxList=group.items.map(function(x){return x.minmax.max;});
    var targets=twcV245DistributedTargets(totalRemainingCapacity,group.items.length,minList,maxList);

    group.items.forEach(function(item,index){
      var service=item.service;
      var roster=rostersByService[service.id];
      var target=targets[index]||0;
      for(var i=0;i<target;i++){
        var person=members
          .filter(function(m){return twcV245MemberCanTake(m,role,service,roster.assignments,roleUsed);})
          .sort(twcV245CandidateSort(roleUsed))[0];
        if(person){
          roster.assignments.push({roleName:role.name,memberId:person.id,memberName:person.name});
          roleUsed[person.id]=(roleUsed[person.id]||0)+1;
        }
      }
      var actual=roster.assignments.filter(function(a){return a.roleName===role.name;}).length;
      for(var j=actual;j<item.minmax.min;j++){
        roster.assignments.push({roleName:role.name,memberId:"",memberName:"Unfilled"});
      }
    });
  });

  return services.map(function(s){return rostersByService[s.id];});
}

function twcV253NormalizeTemplateRoleOrder(template){
  if(!template)return [];
  if(!Array.isArray(template.roleOrder))template.roleOrder=[];
  var all=(data.roles||[]).map(function(r){return r.name;});
  var used=(template.roleNames||[]).filter(function(name){return all.indexOf(name)>=0;});
  var unused=all.filter(function(name){return used.indexOf(name)<0;});
  var existing=template.roleOrder.filter(function(name){return all.indexOf(name)>=0;});
  used.forEach(function(name){if(existing.indexOf(name)<0)existing.push(name);});
  unused.forEach(function(name){if(existing.indexOf(name)<0)existing.push(name);});
  var usedPart=existing.filter(function(name){return used.indexOf(name)>=0;});
  var unusedPart=existing.filter(function(name){return unused.indexOf(name)>=0;});
  template.roleOrder=usedPart.concat(unusedPart);
  return template.roleOrder;
}

function twcV256DatabaseBackupObject(){

    version:VERSION,

    exportedAt:new Date().toISOString(),
    data:JSON.parse(JSON.stringify(data||{}))
  };
}
function twcV256DateStamp(){
  var d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+"_"+String(d.getHours()).padStart(2,"0")+"-"+String(d.getMinutes()).padStart(2,"0");
}
function twcV256ExportDatabaseBackup(){
  try{
    var payload=twcV256DatabaseBackupObject();
    var blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;
    a.download="TheWorshipCalendar_full_database_backup_"+twcV256DateStamp()+".json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
  }catch(err){
    console.error(err);
    alert("Could not create full database backup: "+(err&&err.message?err.message:err));
  }
}

    input.click();
  }

function twcV256ValidateRestoredDatabase(obj){
  if(!obj || typeof obj!=="object")throw new Error("Backup file is not valid JSON.");
  var restored=obj.data&&typeof obj.data==="object"?obj.data:obj;
  if(!restored || typeof restored!=="object")throw new Error("Backup does not contain app data.");
  var required=["members","roles","services","templates","rosters","availability"];
  required.forEach(function(key){
    if(!Array.isArray(restored[key]))restored[key]=[];
  });
  if(!restored.settings || typeof restored.settings!=="object")restored.settings={};
  if(!Array.isArray(restored.ministries))restored.ministries=[];
  return restored;
}
function twcV256ImportDatabaseBackupFile(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(){
    try{
      var parsed=JSON.parse(String(reader.result||"{}"));
      var restored=twcV256ValidateRestoredDatabase(parsed);
      var warning="Restore this full database backup? This will replace the current local database on this device.";
      if(!confirm(warning))return;
      data=restored;
      save();
      alert("Full database restored. The app will now reload.");
      location.reload();
    }catch(err){
      console.error(err);
      alert("Could not restore full database backup: "+(err&&err.message?err.message:err));
    }
  };
  reader.onerror=function(){
    alert("Could not read the selected backup file.");
  };
  reader.readAsText(file);
}

function twcV262TemplateServiceTimes(template){
  if(!template)return "";
  var values=[];
  if(Array.isArray(template.serviceTimes))values=template.serviceTimes;
  else if(typeof template.serviceTimes==="string")values=template.serviceTimes.split(",");
  else if(Array.isArray(template.times))values=template.times;
  else if(typeof template.times==="string")values=template.times.split(",");
  else if(template.defaultTimes)values=String(template.defaultTimes).split(",");
  else if(template.roleTimes&&typeof template.roleTimes==="object"){
    Object.keys(template.roleTimes).forEach(function(roleName){
      String(template.roleTimes[roleName]||"").split(",").forEach(function(t){values.push(t);});
    });
  }
  values=values.map(function(t){return String(t||"").trim();}).filter(Boolean);
  var unique=[];
  values.forEach(function(t){if(unique.indexOf(t)<0)unique.push(t);});
  return unique.join(", ")||"09:00";
}

function twcV266FamilyTogetherScore(member,service,plannedRosters,currentRosterAssignments){
  var rule=twcV266FamilyRule();

function twcV266CandidateSort(roleUsed,service,plannedRosters,currentRosterAssignments){

  return function(a,b){

    var fb=twcV266FamilyTogetherScore(b,service,plannedRosters,currentRosterAssignments);
    return fa-fb || base(a,b);
  };
}
function twcV266BuildRostersForServices(serviceList){
  if(typeof ensureMinistries==="function")ensureMinistries();
  var services=(serviceList||[]).slice().sort(function(a,b){return twcV254ServiceSortKey(a).localeCompare(twcV254ServiceSortKey(b));});
  var rostersByService={};
  services.forEach(function(service){
    rostersByService[service.id]={id:uid(),serviceId:service.id,serviceName:service.name,date:service.date,time:service.time,times:service.times||[service.time],published:false,assignments:[]};
  });

  var groupMap={};
  services.forEach(function(service){
    twcV245RolesForService(service).forEach(function(role){
      var month=String(service.date||"").slice(0,7);
      var key=month+"||"+role.name;
      if(!groupMap[key])groupMap[key]={month:month,role:role,items:[]};
      groupMap[key].items.push({service:service,minmax:twcV245RoleMinMax(service,role)});
    });
  });

  Object.keys(groupMap).sort().forEach(function(key){
    var group=groupMap[key];
    group.items.sort(function(a,b){return twcV254ServiceSortKey(a.service).localeCompare(twcV254ServiceSortKey(b.service));});
    var role=group.role;
    var month=group.month;
    var skipServiceIds={};
    services.forEach(function(s){skipServiceIds[s.id]=true;});

    var members=twcV240AssignableMembers().filter(function(m){return twcV240MemberCanDoRoleBasic(m,role);});
    var roleUsed={};
    members.forEach(function(m){roleUsed[m.id]=twcV245BaseUsed(m.id,role.name,month,skipServiceIds);});

    var totalRemainingCapacity=members.reduce(function(sum,m){
      return sum+Math.max(0,twcV245MemberLimit(m)-(roleUsed[m.id]||0));
    },0);

    var minList=group.items.map(function(x){return x.minmax.min;});
    var maxList=group.items.map(function(x){return x.minmax.max;});
    var targets=twcV245DistributedTargets(totalRemainingCapacity,group.items.length,minList,maxList);

    group.items.forEach(function(item,index){
      var service=item.service;
      var roster=rostersByService[service.id];
      var target=targets[index]||0;
      var plannedRosters=services.map(function(s){return rostersByService[s.id];}).filter(Boolean);
      for(var i=0;i<target;i++){
        var person=members
          .filter(function(m){return twcV254MemberCanTake(m,role,service,roster.assignments,roleUsed,plannedRosters);})
          .sort(twcV266CandidateSort(roleUsed,service,plannedRosters,roster.assignments))[0];
        if(person){
          roster.assignments.push({roleName:role.name,memberId:person.id,memberName:person.name});
          roleUsed[person.id]=(roleUsed[person.id]||0)+1;
        }
      }
      var actual=roster.assignments.filter(function(a){return a.roleName===role.name;}).length;
      for(var j=actual;j<item.minmax.min;j++){
        roster.assignments.push({roleName:role.name,memberId:"",memberName:"Unfilled"});
      }
    });
  });

  return services.map(function(s){return rostersByService[s.id];});
}
function twcV266BuildSameDateBlockForSingleService(serviceId){
  var service=(data.services||[]).find(function(s){return s.id===serviceId;});
  if(!service)throw new Error("Service not found");
  var services=(data.services||[]).filter(function(s){
    return s.date===service.date && !(data.rosters||[]).some(function(r){return r.serviceId===s.id;});
  });
  if(!services.some(function(s){return s.id===service.id;}))services=[service];
  var rosters=twcV266BuildRostersForServices(services);
  return rosters.find(function(r){return r.serviceId===serviceId;})||rosters[0];
}

function makeRoster(){
  var serviceId=(document.getElementById("rosterSvc")||{}).value;
  if(!serviceId){alert("Please select a service.");return}
  var service=(data.services||[]).find(function(s){return s.id===serviceId;});
  if(!service){alert("Service not found.");return}
  data.rosters=data.rosters||[];
  if(data.rosters.some(function(r){return r.serviceId===serviceId;})){alert("A roster already exists for this service.");return}
  try{
    var blockServices=(data.services||[]).filter(function(s){
      return s.date===service.date && !data.rosters.some(function(r){return r.serviceId===s.id;});
    }).sort(function(a,b){return twcV254ServiceSortKey(a).localeCompare(twcV254ServiceSortKey(b));});
    var rosters=twcV266BuildRostersForServices(blockServices);
    rosters.slice().reverse().forEach(function(r){data.rosters.unshift(r);});
    save();
    render();
  }catch(err){
    console.error(err);
    alert("Could not generate roster: "+(err&&err.message?err.message:err));
  }
}
function makeRostersForRange(){
  var start=(document.getElementById("rosterStart")||{}).value;
  var end=(document.getElementById("rosterEnd")||{}).value;
  if(!start||!end){alert("Please select a start and end date.");return}
  data.rosters=data.rosters||[];
  var skipped=0,failed=0;
  var services=(data.services||[])
    .filter(function(s){return s.date>=start&&s.date<=end;})
    .sort(function(a,b){return twcV254ServiceSortKey(a).localeCompare(twcV254ServiceSortKey(b));})
    .filter(function(service){
      if(data.rosters.some(function(r){return r.serviceId===service.id;})){skipped++;return false}
      return true;
    });
  var createdRosters=[];
  try{
    createdRosters=twcV266BuildRostersForServices(services);
    createdRosters.slice().reverse().forEach(function(r){data.rosters.unshift(r);});
  }catch(err){
    console.error(err);
    failed=services.length;
    createdRosters=[];
  }
  save();
  render();
  setTimeout(function(){
    var msg="Created "+createdRosters.length+" roster(s). Skipped "+skipped+". Failed "+failed+".";
    var el=document.getElementById("rangeResult");
    if(el)el.textContent=msg; else alert(msg);
  },0);
}

function twcV267PlannedAssignmentsForDate(date,plannedRosters,currentRosterAssignments){
  var arr=[];
  (plannedRosters||[]).forEach(function(r){
    if(!r||r.date!==date)return;
    (r.assignments||[]).forEach(function(a){if(a&&a.memberId)arr.push(a);});
  });
  (currentRosterAssignments||[]).forEach(function(a){if(a&&a.memberId)arr.push(a);});
  (data.rosters||[]).forEach(function(r){
    if(!r||!r.published||r.date!==date)return;
    (r.assignments||[]).forEach(function(a){if(a&&a.memberId)arr.push(a);});

    if(a.memberId&&ids.indexOf(a.memberId)<0)ids.push(a.memberId);
  });

function twcV267GroupHasMemberOnDate(group,service,plannedRosters,currentRosterAssignments){
  if(!group)return false;
  var ids=twcV267PlannedMemberIdsForDate(service.date,plannedRosters,currentRosterAssignments);
  return (group.memberIds||[]).some(function(id){return ids.indexOf(id)>=0;});
}
function twcV267MateAlreadyOnDate(memberId,service,plannedRosters,currentRosterAssignments){
  var mates=twcV266FamilyGroupMateIds(memberId);
  if(!mates.length)return false;
  var ids=twcV267PlannedMemberIdsForDate(service.date,plannedRosters,currentRosterAssignments);
  return mates.some(function(id){return ids.indexOf(id)>=0;});
}
function twcV267MateCouldServe(member,role,service,rosterAssignments,roleUsed,plannedRosters){
  var g=twcV267MemberFamilyGroup(member.id);
  if(!g)return false;
  var mates=(g.memberIds||[]).filter(function(id){return id!==member.id;});
  if(!mates.length)return false;
  return mates.some(function(id){
    var mate=(data.members||[]).find(function(m){return m.id===id;});
    if(!mate)return false;
    if(twcV240IsProtectedAdminMember(mate))return false;
    if(typeof v152IsAvailable==="function"&&!v152IsAvailable(mate.id,service.id))return false;
    if(!twcV240MemberCanDoRoleBasic(mate,role))return false;
    if((roleUsed[mate.id]||0)>=twcV245MemberLimit(mate))return false;
    if(!twcV254CanMemberServeRoleOnDate(mate.id,role.name,service.date,plannedRosters,rosterAssignments))return false;
    return true;
  });
}
function twcV267MemberCanTake(member,role,service,rosterAssignments,roleUsed,plannedRosters){
  if(!member||twcV240IsProtectedAdminMember(member))return false;
  if(typeof v152IsAvailable==="function"&&!v152IsAvailable(member.id,service.id))return false;
  if(!twcV240MemberCanDoRoleBasic(member,role))return false;
  if((roleUsed[member.id]||0)>=twcV245MemberLimit(member))return false;
  if(!twcV254CanMemberServeRoleOnDate(member.id,role.name,service.date,plannedRosters,rosterAssignments))return false;

  var g=twcV267MemberFamilyGroup(member.id);
  var rule=twcV267GroupRule(g);
  if(rule==="none")return true;

  if(rule==="apart"){
    if(twcV267MateAlreadyOnDate(member.id,service,plannedRosters,rosterAssignments))return false;
  }

  if(rule==="mustTogether"){
    if(twcV267MateAlreadyOnDate(member.id,service,plannedRosters,rosterAssignments))return true;
    if(!twcV267MateCouldServe(member,role,service,rosterAssignments,roleUsed,plannedRosters))return false;
  }

  return true;
}
function twcV254MemberCanTake(member,role,service,rosterAssignments,roleUsed,plannedRosters){

function twcV279ParseJsonSafe(text){
  try{return JSON.parse(text);}catch(e){return null;}
}
function twcV279FindLocalGithubSetupAnywhere(){
  try{
    var best=null;
    for(var i=0;i<localStorage.length;i++){
      var key=localStorage.key(i);
      var raw=localStorage.getItem(key);
      if(!raw||raw[0]!=="{")continue;
      var obj=twcV279ParseJsonSafe(raw);
      if(!obj)continue;
      var candidates=[obj,obj.github,obj.gitHub,obj.githubConfig,obj.settings&&obj.settings.github,obj.data&&obj.data.github,obj.api&&obj.api.github].filter(Boolean);
      candidates.forEach(function(g){
        if(g&&g.token&&g.owner&&g.repo&&g.path){
          best={token:g.token,owner:g.owner,repo:g.repo,branch:g.branch||"main",path:g.path||"data/the-worship-calendar.json"};
        }
      });
    }
    return best;
  }catch(e){return null;}
}
function twcV279ExtractApiSetup(obj){
  if(!obj)return {};
  if(obj.settings)obj=obj.settings;
  var github=obj.github||obj.gitHub||obj.githubConfig||obj.githubAccess||obj.gitHubAccess||obj.apiGithub||null;
  var gmail=obj.gmail||obj.gmailConfig||obj.google||obj.googleGmail||null;
  if(!github&&(obj.token||obj.owner||obj.repo||obj.path)){
    github={token:obj.token||"",owner:obj.owner||"",repo:obj.repo||"",branch:obj.branch||"main",path:obj.path||"data/the-worship-calendar.json"};
  }
  if(!gmail&&(obj.clientId||obj.apiKey||obj.sender)){
    gmail={clientId:obj.clientId||"",apiKey:obj.apiKey||"",sender:obj.sender||"",accessToken:obj.accessToken||""};
  }
  return {github:github||null,gmail:gmail||null};
}

function twcV280Obj(v){return v&&typeof v==="object"?v:{};}
function twcV280FirstGithubCandidate(obj){
  obj=twcV280Obj(obj);
  var candidates=[
    obj.github,
    obj.gitHub,
    obj.githubConfig,
    obj.githubAccess,
    obj.gitHubAccess,
    obj.githubApi,
    obj.githubAPI,
    obj.apiGithub,
    obj.api&&obj.api.github,
    obj.apis&&obj.apis.github,
    obj.settings&&obj.settings.github,
    obj.settings&&obj.settings.gitHub,
    obj.settings&&obj.settings.githubConfig,
    obj.data&&obj.data.github,
    obj.database&&obj.database.github,
    obj.backup&&obj.backup.github,
    obj.config&&obj.config.github,
    obj.local&&obj.local.github,
    obj.online&&obj.online.github
  ].filter(Boolean);
  if(obj.token||obj.owner||obj.repo||obj.path||obj.branch){
    candidates.unshift(obj);
  }
  for(var i=0;i<candidates.length;i++){
    var g=twcV280Obj(candidates[i]);
    var token=g.token||g.githubToken||g.gitHubToken||g.accessToken||g.pat||g.personalAccessToken||g.GITHUB_TOKEN||g.GITHUB_TOKEN_V2||"";
    var owner=g.owner||g.repoOwner||g.githubOwner||g.gitHubOwner||g.user||g.username||g.org||g.organization||"";
    var repo=g.repo||g.repository||g.repoName||g.githubRepo||g.gitHubRepo||"";
    var branch=g.branch||g.githubBranch||g.gitHubBranch||"main";
    var path=g.path||g.filePath||g.dataPath||g.githubPath||g.gitHubPath||g.jsonPath||g.contentPath||"";
    if(token&&owner&&repo){
      return {token:token,owner:owner,repo:repo,branch:branch||"main",path:path||"data/the-worship-calendar.json"};
    }
  }
  return null;
}

/* Robust GitHub save retry for SHA mismatch / HTTP 409 */
function twcV281IsShaMismatchError(err){
  var msg=String((err&&err.message)||err||"");
  return msg.indexOf("HTTP 409")>=0 || msg.indexOf("does not match")>=0 || msg.indexOf("sha")>=0 && msg.indexOf("409")>=0;
}
function twcV281CleanGithubPath(path){
  return String(path||"").replace(/^\/+/,"");
}
function twcV281GithubContentUrl(g){
  return "https://api.github.com/repos/"+encodeURIComponent(g.owner)+"/"+encodeURIComponent(g.repo)+"/contents/"+twcV281CleanGithubPath(g.path);
}
function twcV281EncodeJsonForGithub(obj){
  return btoa(unescape(encodeURIComponent(JSON.stringify(obj,null,2))));
}
async function twcV281FetchLatestGithubFile(){
  var g=ghConfig();
  var branch=g.branch||"main";
  var url=twcV281GithubContentUrl(g)+"?ref="+encodeURIComponent(branch);
  var res=await fetch(url,{headers:{"Authorization":"Bearer "+g.token,"Accept":"application/vnd.github+json"}});
  if(res.status===404)return {data:null,sha:null,exists:false};
  if(!res.ok)throw new Error("Could not fetch latest GitHub file. HTTP "+res.status+" "+await res.text());
  var file=await res.json();
  var raw=String(file.content||"").replace(/\n/g,"");
  var decoded="";
  try{decoded=decodeURIComponent(escape(atob(raw)));}catch(e){decoded=atob(raw);}
  var parsed={};
  try{parsed=JSON.parse(decoded||"{}");}catch(e){parsed={};}
  return {data:parsed,sha:file.sha,exists:true};
}
async function twcV281PutGithubFileOnce(merged,sha){
  var g=ghConfig();
  var body={
    message:"Merge-save The Worship Calendar data "+new Date().toISOString(),
    content:twcV281EncodeJsonForGithub(merged),
    branch:g.branch||"main"
  };
  if(sha)body.sha=sha;
  var res=await fetch(twcV281GithubContentUrl(g),{
    method:"PUT",
    headers:{"Authorization":"Bearer "+g.token,"Accept":"application/vnd.github+json","Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  if(!res.ok){
    var txt=await res.text();
    var err=new Error("Could not save merged GitHub data. HTTP "+res.status+" "+txt);
    err.status=res.status;
    err.responseText=txt;
    throw err;
  }
  return await res.json();
}
async function twcV281RobustPutGithubData(localData,initialSha){
  var pending=twcV268Clone?twcV268Clone(localData):JSON.parse(JSON.stringify(localData||{}));
  var latestSha=initialSha||null;
  var attempts=0;
  while(attempts<4){
    attempts++;
    try{
      return await twcV281PutGithubFileOnce(pending,latestSha);
    }catch(err){
      if(!twcV281IsShaMismatchError(err) || attempts>=4)throw err;
      var latest=await twcV281FetchLatestGithubFile();
      latestSha=latest.sha;
      pending=(typeof twcV268MergeDatabases==="function")?twcV268MergeDatabases(latest.data||{},pending):pending;
    }
  }

function twcV2903PdfRoleColour(roleName){
  var role=twcV2903RoleByName(roleName);
  var raw=role?twcV2903RawRoleColour(role):twcV2903NormalHex((data.roleColors&&data.roleColors[roleName])||"", "#d9eef3");
  return twcV2903BlendWithWhite(raw,0.5);
}
function twcV287SetRoleColour(roleId,colour){
  var role=(data.roles||[]).find(function(r){return String(r.id)===String(roleId);});
  if(!role)return;
  colour=twcV2903NormalHex(colour,"#d9eef3");
  role.pdfColor=colour;
  role.pdfColour=colour;
  role.pdfRowColor=colour;
  role.pdfRowColour=colour;
  data.roleColors=data.roleColors||{};
  if(role.name)data.roleColors[role.name]=twcV2903BlendWithWhite(colour,0.5);
  if(typeof save==="function")save();
  if(typeof render==="function")render();
}
function twcV259RoleColor(roleName){
  data.roleColors=data.roleColors||{};
  var role=twcV2903RoleByName(roleName);
  var pdf=twcV2903PdfRoleColour(roleName);
  if(roleName)data.roleColors[roleName]=pdf;
  if(role){
    /* Keep raw colour on the role record for the picker preview. */
    role.pdfColor=twcV2903RawRoleColour(role);
    role.pdfColour=twcV2903RawRoleColour(role);
  }
  return pdf;
}
function twcV259SetRoleColor(roleName,value){
  data.roleColors=data.roleColors||{};
  roleName=String(roleName||"").trim();
  if(!roleName)return;
  value=twcV2903NormalHex(value,"#d9eef3");
  var role=twcV2903RoleByName(roleName);
  if(role){
    role.pdfColor=value;
    role.pdfColour=value;
    role.pdfRowColor=value;
    role.pdfRowColour=value;
  }
  data.roleColors[roleName]=twcV2903BlendWithWhite(value,0.5);
  if(typeof save==="function")save();
  if(typeof render==="function")render();
}
function twcV259RoleColorStyle(roleName){
  return "background:"+twcV259RoleColor(roleName)+"!important;";
}
function twcV2903SyncPdfRoleColours(){
  try{
    data.roleColors=data.roleColors||{};
    (data.roles||[]).forEach(function(role){
      if(role&&role.name){
        var raw=twcV2903RawRoleColour(role);
        role.pdfColor=raw;
        role.pdfColour=raw;
        data.roleColors[role.name]=twcV2903BlendWithWhite(raw,0.5);
      }
    });
    if(typeof save==="function")save();
  }catch(e){}
}
function twcV2902SyncRoleColours(){return twcV2903SyncPdfRoleColours();}
setTimeout(twcV2903SyncPdfRoleColours,200);

/* v2.94 Restrict Delete Services panel to Services tab only */
function twcV294IsActualServicesTab(){
  try{
    if(typeof tab!=="undefined" && tab!=="services")return false;
    var content=document.querySelector("main.content")||document.getElementById("app")||document.body;
    if(!content)return false;
    var h1=[].slice.call(content.querySelectorAll("h1")).find(function(x){
      return String(x.textContent||"").trim()==="Services";
    });
    return !!h1;
  }catch(e){return false;}
}
function twcV294RemoveServiceDeletionPanelOutsideServices(){
  try{
    var panel=document.getElementById("twcV283ServiceDeletionPanel");
    if(panel && !twcV294IsActualServicesTab())panel.remove();
  }catch(e){}
}
function twcV283EnsureServiceDeletionPanel(){
  try{
    if(typeof user==="undefined"||!user||user.role!=="admin")return;
    if(!twcV294IsActualServicesTab()){
      twcV294RemoveServiceDeletionPanelOutsideServices();
      return;
    }
    var content=document.querySelector("main.content")||document.getElementById("app")||document.body;
    if(!content)return;
    var existing=document.getElementById("twcV283ServiceDeletionPanel");
    if(existing){
      if(existing.parentNode!==content || existing.nextElementSibling){
        content.appendChild(existing);
      }
      return;
    }
    var wrap=document.createElement("div");
    if(typeof twcV286ServiceDeletionPanelHtml==="function")wrap.innerHTML=twcV286ServiceDeletionPanelHtml();
    else if(typeof twcV285ServiceDeletionPanelHtml==="function")wrap.innerHTML=twcV285ServiceDeletionPanelHtml();
    else if(typeof twcV283ServiceDeletionPanelHtml==="function")wrap.innerHTML=twcV283ServiceDeletionPanelHtml();
    if(wrap.firstElementChild)content.appendChild(wrap.firstElementChild);
  }catch(e){}
}
function twcV285MoveServiceDeletionPanelToBottom(){
  try{
    if(!twcV294IsActualServicesTab()){
      twcV294RemoveServiceDeletionPanelOutsideServices();
      return;
    }
    var panel=document.getElementById("twcV283ServiceDeletionPanel");
    var content=document.querySelector("main.content")||document.getElementById("app")||document.body;
    if(panel&&content&&panel.parentNode!==content){
      content.appendChild(panel);
    }else if(panel&&content&&panel.nextElementSibling){
      content.appendChild(panel);
    }
  }catch(e){}
}
setInterval(twcV294RemoveServiceDeletionPanelOutsideServices,700);
setTimeout(twcV294RemoveServiceDeletionPanelOutsideServices,100);

try{document.title="The Worship Calendar";}catch(e){}
