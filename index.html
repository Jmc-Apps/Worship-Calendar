ound:#e6fffa;color:#234e52;border:1px solid #81e6d9;border-radius:999px;padding:4px 10px;font-size:.85rem;margin-top:6px}.warn{background:#fffaf0;border-color:#fbd38d}.danger{background:#fff5f5;border-color:#feb2b2}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{min-height:70px;background:#fff;border:1px solid #d9e2ec;border-radius:14px;padding:8px}.small{font-size:.85rem}@media(max-width:760px){.layout{grid-template-columns:1fr}.sidebar{flex-direction:row;overflow:auto;border-right:0;border-bottom:1px solid #d9e2ec}.content{padding:14px}.sidebar button{white-space:nowrap}.row{align-items:flex-start;flex-direction:column}table{font-size:.9rem}.calendar{grid-template-columns:1fr}}

<script>
const VERSION="2.10",APP="The Worship Calendar",TAG="Plan • Schedule • Serve",KEY="the-worship-calendar-v2-10-local";
const uid=()=>crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random());
const roleNames=["","","","",""," Guitar","","","","",""];
const defaultRoles=[["",1,1],["",1,2],["",0,4],["",0,2],["",0,2],[" Guitar",1,1],["",1,2],["",1,2],["",1,2],["",1,3],["",0,2]].map(r=>({id:uid(),name:r[0],min:r[1],max:r[2]}));
const firstNames=["James","Sarah","Michael","Rachel","Daniel","Emma","Peter","Naomi","David","Hannah","Joshua","Rebecca","Matthew","Grace","Luke","Anna","Mark","Leah","John","Megan","Caleb","Lisa","Andrew","Chloe","Simon","Kate","Nathan","Amy","Thomas","Mary","Ben","Julia","Ethan","Olivia","Noah","Abigail","Liam","Sophie","Isaac","Zoe","Aaron","Tara","Joel","Ruth","Eli","Hope","Jason","Lydia","Chris","Nina","Paul","Mia","Sam","Tessa","Ryan"];
function seedMembers(){let out=[],i=0;defaultRoles.forEach((role,ri)=>{let count=3+(ri%3);for(let n=0;n<count;n++){let name=firstNames[i%firstNames.length]+" "+role.name.split(" ")[0];out.push({id:uid(),name,email:name.toLowerCase().replaceAll(" ",".")+"@example.com",phone:"",password:"",roles:[role.name],notes:" tester for "+role.name,history:[],maxPerMonth:3});i++;}});out.push({id:uid(),name:"Multi Role Example",email:"",phone:"",password:"",roles:["","",""],notes:"Can lead worship or cover vocals/guitar.",history:[],maxPerMonth:3});return out}
function nextWeekday(day){let d=new Date(),diff=(day-d.getDay()+7)%7||7;d.setDate(d.getDate()+diff);return d.toISOString().slice(0,10)}
const DEFAULT={settings:{churchName:"Grace Bible Church",adminPassword:"admin123",logo:""},roles:defaultRoles,templates:[],services:[{id:uid(),name:"Sunday Morning",date:nextWeekday(0),time:"09:00",notes:"",template:"Sunday Morning"}],members:seedMembers(),availability:[],rosters:[],compatibleRoles:{}};
let data=JSON.parse(localStorage.getItem(KEY)||"null")||DEFAULT,user=JSON.parse(sessionStorage.getItem("twc-user")||"null"),tab="dashboard";
function save(){localStorage.setItem(KEY,JSON.stringify(data))}function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function app(h){document.getElementById("app").innerHTML=h;save()}function setUser(u){user=u;tab=(u.role==="admin"?"dashboard":"availability");sessionStorage.setItem("twc-user",JSON.stringify(u));render();startLoginGitHubRefresh()}function logo(){return `<img class="official-logo" src="assets/logo.png" alt="The Worship Calendar logo">`}















function cleanDemoTeamMembersV175(){
  try{
    if(localStorage.getItem("twc-v175-demo-members-cleaned")==="yes")return;
    const demoEmails=["","member@example.com","",""];
    const demoNames=["demo member","sample member","test member","multi role member"];
    data.members=(data.members||[]).filter(m=>{
      if(m.role==="admin"||m.email==="admin")return true;
      const email=String(m.email||"").toLowerCase();
      const name=String(m.name||"").toLowerCase();
      if(demoEmails.includes(email))return false;
      if(email.endsWith("@example.com"))return false;
      if(demoNames.some(x=>name.includes(x)))return false;
      return true;
    });
    if(!data.members.some(m=>m.role==="admin"||m.email==="admin")){
      data.members.unshift({id:"admin",name:"Administrator",email:"admin",password:"admin123",role:"admin",roles:[],ministryIds:[],notes:"",history:[],maxPerMonth:0});
    }
    localStorage.setItem("twc-v175-demo-members-cleaned","yes");
    if(typeof save==="function")save();
  }catch(e){console.error("v2.10 demo member cleanup failed",e)}
}

function cleanAllDemoDataOnceV176(){
  try{
    if(localStorage.getItem("twc-v176-demo-data-cleaned")==="yes")return;
    const keepGithub=data.github||{};
    const keepGmail=data.gmail||{};
    let _adminPreserve=getSystemAdmin(); data.members=[_adminPreserve];
    data.ministries=[];
    data.roles=[];
    data.templates=[];
    data.services=[];
    data.rosters=[];
    data.availability=[];
    data.compatibleRoles={};
    data.github=keepGithub;
    data.gmail=keepGmail;
    localStorage.setItem("twc-v176-demo-data-cleaned","yes");
    if(typeof save==="function")save();
  }catch(e){console.error("v2.10 demo data cleanup failed",e)}
}

function confirmDeleteAction(type){
  const messages={
    member:"Are you sure you want to delete this member?\nThis action cannot be undone.",
    ministry:"Are you sure you want to delete this ministry?\nAll linked roles may be affected.\nThis action cannot be undone.",
    role:"Are you sure you want to delete this role?\nRoster assignments may be affected.\nThis action cannot be undone.",
    template:"Are you sure you want to delete this template?\nThis action cannot be undone.",
    service:"Are you sure you want to delete this service?\nAny generated roster information may be lost.\nThis action cannot be undone.",
    roster:"Are you sure you want to delete this roster?\nThis action cannot be undone.",
    pastRosters:"Are you sure you want to delete ALL past rosters?\nThis action cannot be undone.",
    availability:"Are you sure you want to delete this availability record?\nThis action cannot be undone.",
    data:"Are you sure you want to delete this data?\nThis action cannot be undone."
  };
  return confirm(messages[type]||messages.data);
}
function deleteMember(mid){
  return deleteMemberSafe(mid);
}
function render(){ensureMinistries();if(!user)return loginPage();app(`<header class="topbar"><div class="inline">${logo()}<div><b>${APP}</b><br><span>${TAG} • v${VERSION}</span><br><span id="appVersionBadge" class="badge">v${VERSION}</span></div></div><button onclick="logout()">Log out</button></header><div class="layout"><nav class="sidebar">${(user.role==="admin"?["dashboard","services","roles","templates","members","availability","rosters","emailTeam","settings"]:["availability","personalizedRoster","rosters"]).map(t=>`<button class="${tab===t?"active":""}" onclick="tab='${t}';render()">${t==="emailTeam"?"Email Team":t==="personalizedRoster"?"Personalized Roster":t[0].toUpperCase()+t.slice(1)}</button>`).join("")}</nav><main class="content">${loginRefreshNotice()}${syncBar()}${page()}</main></div>`)}

function isSystemAdmin(m){
  return !!(m&&(m.id==="admin"||String(m.email||"").toLowerCase()==="admin"));
}
function isAdminMemberRecord(m){
  return !!(m&&m.role==="admin");
}
function adminMembers(){
  return (data.members||[]).filter(m=>m.role==="admin");
}
function ensureSystemAdminProtected(){
  data.members=data.members||[];
  let admin=data.members.find(m=>isSystemAdmin(m));
  if(!admin){
    admin={id:"admin",name:"Administrator",email:"admin",password:"admin123",role:"admin",roles:[],ministryIds:[],notes:"",history:[],maxPerMonth:0};
    data.members.unshift(admin);
  }
  admin.id="admin";
  admin.email=admin.email||"admin";
  admin.name=admin.name||"Administrator";
  admin.role="admin";
  admin.roles=admin.roles||[];
  admin.ministryIds=admin.ministryIds||[];
}
function setMemberAdminRole(memberId,isAdmin){
  return setMemberAdminRoleSafe(memberId,isAdmin);
}

function adminRoleControl(member){
  if(!user||user.role!=="admin")return "";
  if(isSystemAdmin(member))return `<span class="badge">System Administrator</span><span class="hint">Protected</span>`;
  return `<label class="chip"><input type="checkbox" ${member.role==="admin"?"checked":""} onchange="setMemberAdminRole('${member.id}',this.checked)"> Admin Role</label>`;
}

function getSystemAdmin(){
  data.members=data.members||[];
  data.settings=data.settings||{};
  let admin=data.members.find(m=>m.id==="admin"||String(m.email||"").toLowerCase()==="admin");
  if(!admin){
    admin={id:"admin",name:"Administrator",email:"admin",password:data.settings.adminPassword||"admin123",role:"admin",roles:[],ministryIds:[],notes:"",history:[],maxPerMonth:0};
    data.members.unshift(admin);
  }
  admin.id="admin";
  admin.email=admin.email||"admin";
  admin.name=admin.name||"Administrator";
  admin.role="admin";
  admin.roles=admin.roles||[];
  admin.ministryIds=admin.ministryIds||[];
  admin.history=admin.history||[];
  if(!admin.password)admin.password=data.settings.adminPassword||"admin123";
  data.settings.adminPassword=admin.password;
  return admin;
}

function normalizeAdminAccount(){
  let admin=getSystemAdmin();
  admin.role="admin";
  data.settings=data.settings||{};
  data.settings.adminPassword=admin.password;
  return admin;
}

function loginPage(){app(`<div class="login"><div class="loginCard">${logo()}<h1>${APP}</h1><h2>${TAG}</h2><p class="badge">v${VERSION} </p><p class="hint"><br></p><form onsubmit="login(event)"><input id="loginEmail" placeholder="Username or email"><input id="loginPass" type="password"><button class="primary">Log in</button></form><hr><h3>Create Member Profile</h3><form onsubmit="register(event)"><input id="regName" placeholder="Full name"><input id="regEmail" placeholder="Email"><input id="regPass" type="password" placeholder="Password"><button>Create profile</button></form><p id="msg" class="notice"></p></div></div>`)}
function page(){if(user&&user.role!=="admin"&&!["availability","personalizedRoster","rosters"].includes(tab))tab="availability";return ({dashboard,services,roles,templates,members,availability,personalizedRoster,rosters,emailTeam:emailTeamPage,settings}[tab]||dashboard)()}function card(t,v){return `<div class="card"><small>${esc(t)}</small><strong>${esc(v)}</strong></div>`}
function dashboard(){let conflicts=data.rosters.reduce((a,r)=>a+conflictsFor(r).length,0),up=[...data.services].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time))[0];return `<h1>Dashboard</h1><div class="cards">${card("Upcoming Service",up?`${up.name} ${up.date} ${up.time}`:"None")}${card("Team Members",data.members.length)}${card("Roles",data.roles.length)}${card("Roster Warnings",conflicts)}</div><p class="hint"> testing data includes 3 to 5 team members for every role.</p>`}
function services(){return `<h1>Services</h1>${user.role==="admin"?`<div class="panel"><label>Service name<input id="svcName" placeholder="Service name" value="Sunday Morning"></label><label>Start date<input id="svcDate" type="date" value="${nextWeekday(0)}"></label><label>Service times <span class="small">(comma separated, e.g. 09:00, 11:00, 18:00)</span><input id="svcTimes" placeholder="09:00, 11:00" value="09:00"></label><label>Repeat for weeks <span class="small">(recurring services only)</span><input id="svcWeeks" type="number" min="1" value="8"></label><label>Template<select id="svcTemplate">${data.templates.map(t=>`<option>${esc(t.name)}</option>`).join("")}</select></label><label>Service type<select id="svcType"><option value="recurring">Weekly Recurring Service</option><option value="adhoc">One-Off Service</option></select></label><input id="svcNotes" placeholder="Notes"><div class="inline"><button class="primary" onclick="addService()">Add Service</button><button onclick="addRecurring()">Generate Weekly Series</button></div><p class="hint">Multiple times are stored as one service with one roster and one availability record. The same team serves all listed times.</p></div>`:""}<div class="calendar">${data.services.sort((a,b)=>(a.date+(a.time||((a.times||[])[0])||"")).localeCompare(b.date+(b.time||((b.times||[])[0])||""))).map(s=>`<div class="day"><b>${esc(s.date)}</b><br>${esc(s.name)}<br><span class="small">Times: ${esc(serviceTimesText(s))} • ${esc(s.template||"")} • ${esc(s.type||"service")}</span>${user.role==="admin"?`<br><button onclick="delService('${s.id}')">Delete</button>`:""}</div>`).join("")}</div>`}

function ensureMinistries(){
  data.ministries = data.ministries || [{id:"default",name:""}];
  if(!data.ministries.length)data.ministries.push({id:"default",name:""});
  data.roles.forEach(r=>{ if(!r.ministryId) r.ministryId = data.ministries[0].id; });
}
function getMinistryName(id){
  ensureMinistries();
  let m=data.ministries.find(x=>x.id===id);
  return m?m.name:"";
}
function addMinistry(){
  ensureMinistries();
  let el=document.getElementById("newMinistryName");
  let name=(el&&el.value||"").trim();
  if(!name){alert("Please enter a ministry name.");return}
  if(data.ministries.some(m=>m.name.toLowerCase()===name.toLowerCase())){alert("That ministry already exists.");return}
  data.ministries.push({id:uid(),name});
  save();render();
}
function editMinistry(id,value){
  ensureMinistries();
  let m=data.ministries.find(x=>x.id===id);
  if(!m)return;
  let name=(value||"").trim();
  if(!name){alert("Ministry name cannot be blank.");render();return}
  m.name=name;
  save();render();
}
function deleteMinistry(id){
  if(!confirmDeleteAction("ministry"))return;

  ensureMinistries();
  if(id===data.ministries[0].id){alert("The default ministry cannot be deleted.");return}
  let min=data.ministries.find(m=>m.id===id);
  if(!min)return;
  if(data.roles.some(r=>r.ministryId===id)){alert("Move or delete this ministry's roles first.");return}
  if(!confirm(`Delete ministry "${min.name}"?`))return;
  data.ministries=data.ministries.filter(m=>m.id!==id);
  save();render();
}
function moveRoleMinistry(roleId,ministryId){
  ensureMinistries();
  let r=data.roles.find(x=>x.id===roleId);
  if(!r)return;
  r.ministryId=ministryId;
  save();render();
}
function addRoleFromRolesTab(){
  ensureMinistries();
  let nameEl=document.getElementById("roleName");
  let minEl=document.getElementById("roleMinistry");
  let name=(nameEl&&nameEl.value||"").trim();
  if(!name){alert("Please enter a role name.");return}
  if(data.roles.some(r=>r.name.toLowerCase()===name.toLowerCase())){alert("That role already exists.");return}
  data.roles.push({id:uid(),name,ministryId:(minEl&&minEl.value)||data.ministries[0].id});data.compatibleRoles=data.compatibleRoles||{};data.compatibleRoles[name]=data.compatibleRoles[name]||[];
  data.templates.forEach(t=>{
    t.roleNames=t.roleNames||[];
    t.roleMin=t.roleMin||{};
    t.roleMax=t.roleMax||{};
    t.roleTimes=t.roleTimes||{};
    t.roleMin[name]=1;
    t.roleMax[name]=1;
  });
  save();render();
}

function compatibleList(roleName){
  data.compatibleRoles=data.compatibleRoles||{};
  return data.compatibleRoles[roleName]||[];
}
function rolesCompatible(a,b){
  if(a===b)return true;
  data.compatibleRoles=data.compatibleRoles||{};
  return (data.compatibleRoles[a]||[]).includes(b)||(data.compatibleRoles[b]||[]).includes(a);
}
function compatibleRoleText(role){
  let list=compatibleList(role.name);
  return list.length?list.map(esc).join(", "):"<span class='small'>None</span>";
}
function compatibleRoleButtons(role){
  data.compatibleRoles=data.compatibleRoles||{};
  if(typeof ensureMinistries==="function")ensureMinistries();
  let ministries=(data.ministries&&data.ministries.length)?data.ministries:[{id:"default",name:""}];
  let fallback=ministries[0]?.id||"default";
  return `<div class="compatible-groups">${ministries.map(min=>{
    let roles=data.roles.filter(other=>other.name!==role.name && (other.ministryId||fallback)===min.id);
    if(!roles.length)return "";
    return `<div class="compatible-ministry-group"><b>${esc(min.name)}</b><div class="chips">${roles.map(other=>`<button class="chip ${rolesCompatible(role.name,other.name)?"on":""}" onclick="toggleCompatibleRole('${esc(role.name)}','${esc(other.name)}')">${esc(other.name)}</button>`).join("")}</div></div>`;
  }).join("")}</div>`;
}

function toggleCompatibleRole(a,b){
  data.compatibleRoles=data.compatibleRoles||{};
  data.compatibleRoles[a]=data.compatibleRoles[a]||[];
  data.compatibleRoles[b]=data.compatibleRoles[b]||[];
  let on=(data.compatibleRoles[a]||[]).includes(b)||(data.compatibleRoles[b]||[]).includes(a);
  if(on){
    data.compatibleRoles[a]=data.compatibleRoles[a].filter(x=>x!==b);
    data.compatibleRoles[b]=data.compatibleRoles[b].filter(x=>x!==a);
  }else{
    data.compatibleRoles[a].push(b);
    data.compatibleRoles[b].push(a);
  }
  save();
  render();
}
function roles(){
  ensureMinistries();
  let adminTools="";
  if(user.role==="admin"){
    adminTools=`<div class="panel"><h3>Add Ministry</h3><div class="inline"><input id="newMinistryName" placeholder="Ministry name" style="max-width:260px"><button class="primary" onclick="addMinistry()">Add Ministry</button></div></div>
    <div class="panel"><h3>Add Role</h3><div class="inline"><input id="roleName" placeholder="Role name" style="max-width:240px"><select id="roleMinistry" style="max-width:260px">${data.ministries.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join("")}</select><button class="primary" onclick="addRoleFromRolesTab()">Add role</button></div></div>`;
  }
  let panels=data.ministries.map(min=>{
    let ministryRoles=data.roles.filter(r=>(r.ministryId||data.ministries[0].id)===min.id);
    let rows=ministryRoles.map(r=>{
      let roleCell=user.role==="admin"?`<input value="${esc(r.name)}" onchange="editRole('${r.id}','name',this.value)">`:esc(r.name);
      let moveCell=user.role==="admin"?`<select onchange="moveRoleMinistry('${r.id}',this.value)">${data.ministries.map(m=>`<option value="${m.id}" ${m.id===(r.ministryId||data.ministries[0].id)?"selected":""}>${esc(m.name)}</option>`).join("")}</select>`:esc(typeof getMinistryName==="function"?getMinistryName(r.ministryId):min.name);
      let compat=user.role==="admin"?compatibleRoleButtons(r):compatibleRoleText(r);
      let actions=user.role==="admin"?`<button onclick="delRole('${r.id}')">Delete</button>`:"";
      return `<tr><td>${roleCell}</td><td>${teamMembers().filter(m=>m.roles.includes(r.name)).length}</td><td>${moveCell}</td><td>${compat}</td><td>${actions}</td></tr>`;
    }).join("");
    if(!rows)rows=`<tr><td colspan="5"><span class="hint">No roles in this ministry yet.</span></td></tr>`;
    let deleteButton=user.role==="admin"&&min.id!==data.ministries[0].id?`<button onclick="deleteMinistry('${min.id}')">Delete Ministry</button>`:"";
    let title=user.role==="admin"?`<input value="${esc(min.name)}" onchange="editMinistry('${min.id}',this.value)">`:esc(min.name);
    return `<div class="panel"><div class="row"><h3>${title}</h3>${deleteButton}</div><p class="hint">Compatible roles are roles that one member may perform at the same service.</p><table><tr><th>Role</th><th>Members</th><th>Ministry</th><th>Compatible Roles</th><th>Actions</th></tr>${rows}</table></div>`;
  }).join("");

function icsEscape(value){
  return String(value||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\r?\n/g,"\\n");
}
function pad2(n){return String(n).padStart(2,"0")}
function formatICSDateTimeLocal(dateStr,timeStr){
  let t=(timeStr||"09:00").trim();
  let parts=t.split(":");
  let hh=pad2(parseInt(parts[0]||"0",10));
  let mm=pad2(parseInt(parts[1]||"0",10));
  return dateStr.replace(/-/g,"")+"T"+hh+mm+"00";
}
function addMinutesToTime(dateStr,timeStr,minutes){
  let d=new Date(dateStr+"T"+(timeStr||"09:00")+":00");
  d.setMinutes(d.getMinutes()+minutes);
  return d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate())+"T"+pad2(d.getHours())+pad2(d.getMinutes())+"00";
}
function utcStamp(){
  let d=new Date();
  return d.getUTCFullYear()+pad2(d.getUTCMonth()+1)+pad2(d.getUTCDate())+"T"+pad2(d.getUTCHours())+pad2(d.getUTCMinutes())+pad2(d.getUTCSeconds())+"Z";
}
function foldICSLine(line){
  let out="";
  while(line.length>73){
    out+=line.slice(0,73)+"\r\n ";
    line=line.slice(73);
  }
  return out+line;
}
function downloadMyCalendar(){
  const member=data.members.find(m=>m.id===user.memberId);
  if(!member){alert("Member profile not found.");return}
  const events=[];
  data.rosters.filter(r=>r.published).forEach(r=>{
    const roles=(r.assignments||[]).filter(a=>a.memberId===member.id).map(a=>a.roleName);
    if(!roles.length)return;
    const times=(r.times&&r.times.length?r.times:[r.time||"09:00"]).filter(Boolean);
    times.forEach((t,i)=>{
      events.push({
        uid:`${r.id}-${member.id}-${i}@theworshipcalendar.local`,
        date:r.date,
        time:t,
        summary:`${r.serviceName} - ${roles.join(", ")}`,
        description:`Rostered via The Worship Calendar\\nRoles: ${roles.join(", ")}\\nService Times: ${serviceTimesText(r)}`,durationMinutes:getTemplateServiceLength((data.services.find(s=>s.id===r.serviceId)||{}).template)
      });
    });
  });
  if(!events.length){alert("No published rostered services found for your profile.");return}
  let lines=[
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//The Worship Calendar//Roster Export//EN",
    "CALSCALE:GREGORIAN",
    "METHOD:PUBLISH"
  ];
  const stamp=utcStamp();
  events.forEach(ev=>{
    lines.push("BEGIN:VEVENT");
    lines.push("UID:"+icsEscape(ev.uid));
    lines.push("DTSTAMP:"+stamp);
    lines.push("DTSTART:"+formatICSDateTimeLocal(ev.date,ev.time));
    lines.push("DTEND:"+addMinutesToTime(ev.date,ev.time,ev.durationMinutes||90));
    lines.push("SUMMARY:"+icsEscape(ev.summary));
    lines.push("DESCRIPTION:"+icsEscape(ev.description));
    lines.push("END:VEVENT");
  });
  lines.push("END:VCALENDAR");
  const icsText=lines.map(foldICSLine).join("\r\n")+"\r\n";
  const blob=new Blob([icsText],{type:"text/calendar;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="TheWorshipCalendar_My_Roster_v1.36.ics";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

  if(a===b)return true;
  data.compatibleRoles=data.compatibleRoles||{};
  return (data.compatibleRoles[a]||[]).includes(b)||(data.compatibleRoles[b]||[]).includes(a);
}
function v152MemberCanDoRole(member,role){
  if(!(member.roles||[]).includes(role.name))return false;
  if(data.ministries&&data.ministries.length&&role.ministryId){
    let ids=member.ministryIds||[data.ministries[0].id];
    if(!ids.includes(role.ministryId))return false;
  }
  return true;

function v152CandidateOk(member,role,service,currentAssignments){
  if(!v152IsAvailable(member.id,service.id))return false;
  let limit=member.maxPerMonth??3;
  if(limit<=0)return false;
  if(v152MonthlyCount(member.id,v152MonthKey(service.date))>=limit)return false;
  if(!v152MemberCanDoRole(member,role))return false;
  let current=(currentAssignments||[]).filter(a=>a.memberId===member.id).map(a=>a.roleName);
  if(current.includes(role.name))return false;
  return current.length===0||current.every(r=>v152RolesCompatible(r,role.name));
}
function v152BuildRosterForService(serviceId){
  if(typeof ensureMinistries==="function")ensureMinistries();
  let service=(data.services||[]).find(s=>s.id===serviceId);
  if(!service)throw new Error("Service not found");
  let template=(data.templates||[]).find(t=>t.name===service.template);
  let roles=(data.roles||[]).filter(role=>!template||!template.roleNames||template.roleNames.includes(role.name));
  let assignments=[];
  roles.forEach(role=>{
    let min=(template&&template.roleMin&&template.roleMin[role.name]!==undefined)?parseInt(template.roleMin[role.name],10):(role.min??1);
    let max=(template&&template.roleMax&&template.roleMax[role.name]!==undefined)?parseInt(template.roleMax[role.name],10):(role.max??1);
    min=Math.max(0,min||0);
    max=Math.max(min,max||min||1);
    for(let i=0;i<max;i++){
      let person=(data.members||[])
        .filter(m=>v152CandidateOk(m,role,service,assignments))
        .sort((a,b)=>v152AssignmentCount(a.id)-v152AssignmentCount(b.id)||String(a.name).localeCompare(String(b.name)))[0];
      if(person)assignments.push({roleName:role.name,memberId:person.id,memberName:person.name});
    }
    for(let i=assignments.filter(a=>a.roleName===role.name).length;i<min;i++){
      assignments.push({roleName:role.name,memberId:"",memberName:"Unfilled"});
    }
  });
  return {id:uid(),serviceId:service.id,serviceName:service.name,date:service.date,time:service.time,times:service.times||[service.time],published:false,assignments};
}

function makeRostersForRange(){
  let start=(document.getElementById("rosterStart")||{}).value;
  let end=(document.getElementById("rosterEnd")||{}).value;
  if(!start||!end){alert("Please select a start and end date.");return}
  data.rosters=data.rosters||[];
  let created=0,skipped=0,failed=0;
  (data.services||[])
    .filter(s=>s.date>=start&&s.date<=end)
    .sort((a,b)=>(a.date+(a.time||((a.times||[])[0])||"")).localeCompare(b.date+(b.time||((b.times||[])[0])||"")))
    .forEach(service=>{
      if(data.rosters.some(r=>r.serviceId===service.id)){skipped++;return}
      try{data.rosters.unshift(v152BuildRosterForService(service.id));created++}
      catch(err){console.error(err);failed++}
    });
  save();
  render();
  setTimeout(()=>{
    let msg=`Created ${created} roster(s). Skipped ${skipped}. Failed ${failed}.`;
    let el=document.getElementById("rangeResult");
    if(el)el.textContent=msg; else alert(msg);
  },0);
}

async function refreshFromGitHubAfterLogin(){
  try{
    if(typeof ghConfig!=="function"||typeof ghGetFile!=="function"||typeof ghDecodeUnicode!=="function"){
      setLoginRefreshStatus("",false);
      return false;
    }
    let g=ghConfig();
    if(!g||!g.token||!g.owner||!g.repo||!g.branch||!g.path){
      setLoginRefreshStatus("No connection file uploaded",true);
      return false;
    }
    setLoginRefreshStatus("Refreshing data from GitHub…",false);
    let file=await ghGetFile(g);
    if(!file){
      setLoginRefreshStatus("No GitHub data file found. Using local cached data.",true);
      return false;
    }
    let loaded=JSON.parse(ghDecodeUnicode(file.content));
    let currentGithub=data.github||{};
    let currentGmail=data.gmail||{};
    let localGithub=typeof loadGithubAccessLocal==="function"?loadGithubAccessLocal():null;
    let localGmail=typeof loadGmailLocalConfig==="function"?loadGmailLocalConfig():null;
    let currentUser=user;
    let currentTab=tab;

    data=loaded;

    data.github=data.github||{};
    ["token","owner","repo","branch","path"].forEach(k=>{
      data.github[k]=(currentGithub&&currentGithub[k])||(localGithub&&localGithub[k])||data.github[k]||"";
    });

    data.gmail=data.gmail||{};
    ["clientId","apiKey","sender","accessToken","connectedAt"].forEach(k=>{
      data.gmail[k]=(currentGmail&&currentGmail[k])||(localGmail&&localGmail[k])||data.gmail[k]||"";
    });

    user=currentUser;
    tab=currentTab;

    if(typeof saveGithubAccessLocal==="function"){
      saveGithubAccessLocal({token:data.github.token||"",owner:data.github.owner||"",repo:data.github.repo||"",branch:data.github.branch||"main",path:data.github.path||"data/the-worship-calendar.json"});
    }
    if(typeof saveGmailLocalConfig==="function")saveGmailLocalConfig();
    if(typeof save==="function")save();

    setLoginRefreshStatus("Data refreshed from GitHub",false);
    render();
    return true;
  }catch(e){
    console.error("Background GitHub refresh failed",e);
    setLoginRefreshStatus("Could not refresh from GitHub. Using local cached data.",true);
    return false;
  }
}

function ghValidate(){

  if(!g.token||!g.owner||!g.repo||!g.branch||!g.path){
    throw new Error("GitHub settings are incomplete. Admin must enter token, owner, repo, branch and data file path.");

function ghApiUrl(g){
  return `https://api.github.com/repos/${encodeURIComponent(g.owner)}/${encodeURIComponent(g.repo)}/contents/${g.path.split("/").map(encodeURIComponent).join("/")}?ref=${encodeURIComponent(g.branch)}`;
}
function ghWriteUrl(g){
  return `https://api.github.com/repos/${encodeURIComponent(g.owner)}/${encodeURIComponent(g.repo)}/contents/${g.path.split("/").map(encodeURIComponent).join("/")}`;
}
function ghEncodeUnicode(str){
  return btoa(unescape(encodeURIComponent(str)));
}
function ghDecodeUnicode(str){
  return decodeURIComponent(escape(atob(str.replace(/\n/g,""))));
}
async function ghGetFile(g){
  let res=await fetch(ghApiUrl(g),{headers:{Authorization:`Bearer ${g.token}`,Accept:"application/vnd.github+json"}});
  if(res.status===404)return null;
  if(!res.ok)throw new Error(`GitHub read failed: ${res.status} ${await res.text()}`);
  return await res.json();
}
function ghExportData(){
  let copy=JSON.parse(JSON.stringify(data));

  // Never upload tokens/secrets to GitHub app data.
  // GitHub blocks these via secret scanning and they should remain local-device only.
  copy.github=copy.github||{};
  delete copy.github.token;
  copy.github.tokenStored="local-device-only";

  copy.gmail=copy.gmail||{};
  delete copy.gmail.accessToken;
  delete copy.gmail.refreshToken;
  delete copy.gmail.apiKey;
  copy.gmail.accessTokenStored="local-device-only";
  copy.gmail.apiKeyStored="local-device-only";

  return copy;
}
async function submitChangesOnline(){
  async function doSaveWithLatestSha(){
    let g=ghValidate();
    let existing=await ghGetFile(g);
    let payload=ghExportData();
    payload.github=payload.github||{};
    payload.github.lastSync=new Date().toISOString();
    let body={
      message:`The Worship Calendar sync ${new Date().toISOString()}`,
      content:ghEncodeUnicode(JSON.stringify(payload,null,2)),
      branch:g.branch
    };
    if(existing&&existing.sha)body.sha=existing.sha;
    let res=await fetch(ghWriteUrl(g),{
      method:"PUT",
      headers:{Authorization:`Bearer ${g.token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    if(!res.ok){
      let text=await res.text();
      let err=new Error(`GitHub save failed: ${res.status} ${text}`);
      err.status=res.status;
      throw err;
    }
    return await res.json();
  }
  try{
    save();
    ghStatus("Saving online…");
    await doSaveWithLatestSha();
    data.github=data.github||{};
    data.github.lastSync=new Date().toISOString();
    save();
    ghStatus("Saved online");
    return true;
  }catch(err){
    if(err&&err.status===409){
      try{
        ghStatus("GitHub file changed online. Retrying with latest version…");
        await doSaveWithLatestSha();
        data.github=data.github||{};
        data.github.lastSync=new Date().toISOString();
        save();
        ghStatus("Saved online after refresh");
        return true;
      }catch(retryErr){
        console.error(retryErr);
        ghStatus("Failed to save after retry: "+(retryErr.message||retryErr),true);
        throw retryErr;
      }
    }
    console.error(err);
    ghStatus("Failed to save: "+(err.message||err),true);
    throw err;
  }
}

function rosterEmailTextForMember(member){
  let lines=[];
  lines.push(`Hi ${member.name || ""},`);
  lines.push("");
  lines.push("Here is your personalized worship roster:");
  lines.push("");
  let published=(data.rosters||[])
    .filter(r=>r.published)
    .map(r=>({roster:r,assignments:(r.assignments||[]).filter(a=>a.memberId===member.id)}))
    .filter(x=>x.assignments.length)
    .sort((a,b)=>(a.roster.date+(a.roster.time||((a.roster.times||[])[0])||"")).localeCompare(b.roster.date+(b.roster.time||((b.roster.times||[])[0])||"")));
  if(!published.length){
    lines.push("You are not currently rostered for any published services.");
  }else{
    published.forEach(item=>{
      let r=item.roster;
      lines.push(`${r.date} — ${r.serviceName} (${typeof serviceTimesText==="function"?serviceTimesText(r):((r.times&&r.times.length?r.times:[r.time||""]).join(", "))})`);
      let grouped={};
      item.assignments.forEach(a=>{
        let ministry="Ministry";
        if(typeof v152RoleMinistryId==="function"&&typeof v152MinistryName==="function"){
          ministry=v152MinistryName(v152RoleMinistryId(a.roleName));
        }else if(typeof v153RoleMinistryId==="function"&&typeof v153MinistryName==="function"){
          ministry=v153MinistryName(v153RoleMinistryId(a.roleName));
        }else if(typeof getMinistryName==="function"){
          let role=(data.roles||[]).find(x=>x.name===a.roleName);
          ministry=getMinistryName(role&&role.ministryId);
        }
        (grouped[ministry]=grouped[ministry]||[]).push(a.roleName);
      });
      Object.keys(grouped).forEach(min=>{
        lines.push(`  ${min}:`);
        grouped[min].forEach(role=>lines.push(`  - ${role}`));
      });
      lines.push("");
    });
  }
  lines.push("Blessings,");
  lines.push(memberEmailSignature());
  return lines.join("\n");
}
function makeRawGmailMessage(to,subject,body){
  let g=gmailConfig();
  let from=g.sender?`From: ${g.sender}\r\n`:"";
  let raw=`${from}To: ${to}\r\nSubject: ${subject}\r\nContent-Type: text/plain; charset="UTF-8"\r\n\r\n${body}`;
  return btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
async function sendGmailMessage(to,subject,body){
  let g=gmailConfig();
  if(!g.accessToken)throw new Error("Gmail is not connected.");
  let raw=makeRawGmailMessage(to,subject,body);
  let res=await fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages/send",{
    method:"POST",
    headers:{Authorization:`Bearer ${g.accessToken}`,"Content-Type":"application/json"},
    body:JSON.stringify({raw})
  });
  if(!res.ok)throw new Error(`Failed sending to ${to}: ${res.status} ${await res.text()}`);
  return await res.json();
}

function importApiBackupFile(input){
  let file=input.files&&input.files[0];
  if(!file)return;
  let reader=new FileReader();
  reader.onload=()=>{
    try{
      let backup=JSON.parse(reader.result);
      if(backup.type!=="the-worship-calendar-api-backup")throw new Error("This is not a valid Worship Calendar API backup file.");
      data.github=data.github||{};
      if(backup.github){
        ["token","owner","repo","branch","path"].forEach(k=>{if(backup.github[k]!==undefined)data.github[k]=backup.github[k]});
        if(typeof saveGithubAccessLocal==="function")saveGithubAccessLocal({
          token:data.github.token||"",
          owner:data.github.owner||"",
          repo:data.github.repo||"",
          branch:data.github.branch||"main",
          path:data.github.path||"data/the-worship-calendar.json"
        });
      }
      data.gmail=data.gmail||{};
      if(backup.gmail){
        ["clientId","apiKey","sender","accessToken","connectedAt"].forEach(k=>{if(backup.gmail[k]!==undefined)data.gmail[k]=backup.gmail[k]});
        if(typeof saveGmailLocalConfig==="function")saveGmailLocalConfig();
      }
      data.settings=data.settings||{};
      if(backup.settings&&backup.settings.churchName!==undefined)data.settings.churchName=backup.settings.churchName;
      save();
      alert("API backup imported.");
      render();
    }catch(err){alert("Could not import API backup: "+(err.message||err))}
  };
  reader.readAsText(file);
  input.value="";
}
